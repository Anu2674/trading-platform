# Trading Platform — Infrastructure Services
# Command: docker compose up -d
# Stop:    docker compose down

services:

  # ─────────────────────────────────────────
  # PostgreSQL + TimescaleDB
  # Stores: submissions, scores, latency data
  # ─────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
      POSTGRES_DB: trading_db
    ports:
      - "5433:5432"       # 5433 on host (avoids conflict with existing postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # Stores: live score cache, WebSocket pubsub
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    ports:
      - "6380:6379"       # 6380 on host (avoids conflict with existing redis)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redpanda (Kafka-compatible message queue)
  # Stores: bot telemetry events (latency, fills)
  # ─────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: trading_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"       # Kafka-compatible port (bots connect here)
      - "8082:8082"       # REST proxy
      - "9644:9644"       # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # Redpanda Console (Web UI — optional)
  # View messages, topics at localhost:8080
  # ─────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: trading_redpanda_console
    restart: unless-stopped
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

# ─────────────────────────────────────────
# Persistent Volumes (data survives restarts)
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  redpanda_data:
